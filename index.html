<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>别让烟花污染我们的天空 🌍</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #74b9ff, #0984e3);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    h2 {
      font-size: 1.8rem;
      margin: 20px 0;
      font-weight: 300;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .image-container {
      display: flex;
      justify-content: space-around;
      margin: 40px 0;
      flex-wrap: wrap;
    }

    .image-item {
      width: 45%;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.4s ease;
    }

    .image-item:hover {
      transform: translateY(-10px);
    }

    .image-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .btn {
      display: inline-block;
      background: #ff7675;
      color: white;
      padding: 15px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      margin-top: 20px;
      font-weight: 600;
      box-shadow: 0 6px 15px rgba(255, 118, 117, 0.4);
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #ff5252;
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(255, 118, 117, 0.6);
    }

    .footer {
      margin-top: 50px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }
      h2 {
        font-size: 1.5rem;
      }
      .image-item {
        width: 100%;
        margin: 15px 0;
      }
    }

    /* 模拟烟花爆炸的微动效（背景） */
    .sparkle {
      position: fixed;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: sparkle 1.5s ease-out;
      opacity: 0;
    }

    @keyframes sparkle {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: scale(2);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>别让烟花污染我们的天空 🌍</h1>
    <h2>每一声爆裂，都是对地球的伤害</h2>

    <p>
      烟花虽美，却带来了空气污染、噪音污染和火灾隐患。每年春节期间，PM2.5浓度飙升，城市上空笼罩灰霾，儿童与老人呼吸困难，野生动物惊慌逃窜。
    </p>

    <p>
      我们可以换一种方式庆祝：点亮电子灯、放孔明灯（环保材质）、用音乐代替爆竹，让传统更文明，让节日更洁净。
    </p>

    <div class="image-container">
      <div class="image-item">
        <!-- 备选雾霾图片 -->
        <img src="https://images.unsplash.com/photo-1562883676-8c7feb83f09b?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="雾霾笼罩的城市">
      </div>
      <div class="image-item">
        <!-- 备选蓝天图片 -->
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="清澈的蓝天">
      </div>
    </div>

    <a href="#" class="btn">我承诺，今年不放烟花 🌿</a>

    <div class="footer">
      🌱 为下一代留下一片清澈的天空 —— 从你我开始
    </div>
  </div>

  <!-- 小烟花特效（背景随机出现） -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      setInterval(() => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + 'vw';
        sparkle.style.top = Math.random() * 100 + 'vh';
        sparkle.style.animationDelay = Math.random() * 2 + 's';
        body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1500);
      }, 800);
    });
  </script>

</body>
</html>
